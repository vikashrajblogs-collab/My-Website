<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Site</title>
    <link rel="icon" type="icon/x-image" href="Assest/Assest/android-chrome-192x192.png">
    <style>
        @keyframes vikashBabu {
            0% {
             transform: translateY(100%);
             opacity: 0;
            } 
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
     #signup-page {
        text-align: center;
        color: aliceblue;
        background-color: gray;
        width: 450px; 
        height: 495px;
        margin-left: 422px;
        border-radius: 9px;
        box-shadow: 0px 6px 14px blue;
        transform: translateY(20px);
        animation: vikashBabu 1.25s ease-out;
        
     }
     #fname, #lname, #gmail, #pass, #cpass {
        width: 240px;
        height: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 12px black;
     }
     .page {
        background-color: black;
        width: 1260px;
        height: 560px;
        border-radius: 6px;
     }
     .submit-btn {
        background-color: tomato;
        width: 100px;
        height: 32px;
        border-radius: 6px;
        box-shadow: 0 3px 8px black;
        font-weight: 700;
        cursor: pointer;
     }
     .submit-btn:hover {
        background-color: green;
        color: red;
        font-weight: bold;
        border-radius: 13px;
        text-shadow: 0 4px 8px black;
     }
    </style>
</head>
<body>
    <div class="page"> 
        <form id="signup-page">
    <header><h1 style="text-align: center; color: red; text-shadow: 0 5px 13px black; font-weight: bold;">Create An Account</h1></header>
    
    
        <label><b>F Name</b></label><br>
        <input type="text" id="fname" placeholder="First Name"><br><br>
        <label><b>L Name</b></label><br>
        <input type="text" id="lname" placeholder="Last Name"><br><br>
        <label><b>Email Id</b></label><br>
        <input type="email" id="gmail" placeholder="Email Id"><br><br>
        <label><b>Password</b></label><br>
        <input type="password" id="pass" placeholder="Password"><br><br>
        <label><b>Confirm Pass</b></label><br>
        <input type="password" id="cpass" placeholder="Confirm Password"><br><br>
        <input type="button" class="submit-btn" onclick="submitBtn()" value="Submit">
        <p id="message"></p>
    </form>
    </div>
    <script>
     function submitBtn() {
        let f = document.getElementById("fname").value;
        let l = document.getElementById("lname").value;
        let e = document.getElementById("gmail").value;
        let p1 = document.getElementById("pass").value;
        let p2 = document.getElementById("cpass").value;
        let msg = document.getElementById("message");

        if(f === "" || l === "" || e === "" || p1 === "" || p2 === "") {
            msg.innerHTML = "All Field Requred";
            msg.style.color = "red";
            msg.style.textShadow = "0 4px 9px yellow";

        } else if(p1 === p2) {
            localStorage.setItem("seved_fname", f);
            localStorage.setItem("seved_gmail", e);
            localStorage.setItem("seved_pass", p1);

            msg.innerHTML = "Signup Succsesful";
            msg.style.color = "green";
            msg.style.fontWeight = "bold";
            msg.style.textShadow = "0 4px 9px white";

            setTimeout(function() {
                window.location.href = "Vlogin.html";
            }, 1000);
        } else {
            msg.innerHTML = "Don't Match Password";
            msg.style.color = "red";
        }
     }
    </script>
</body>
</html>
